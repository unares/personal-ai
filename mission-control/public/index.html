  <!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Personal AI — Mission Control</title><link rel="stylesheet" href="style.css"></head><body><header><div
  class="hl"><h1>Mission Control</h1><div id="tabs"></div></div><div class="hr"><button id="spawn-btn" class="btn bp">+ New Sandbox</button></div></header><main><section id="lg-panel"><div id="lg-stage"><div id="clark-guy" class="guy"
  data-role="clark"><svg class="sil" viewBox="0 0 60 100"><ellipse cx="30" cy="18" rx="14" ry="14" class="head"/><path d="M10 100 Q10 55 30 50 Q50 55 50 100Z" class="body"/><line x1="10" y1="65" x2="0" y2="85" class="arm"/><line x1="50"
  y1="65" x2="60" y2="85" class="arm"/></svg><div class="gl">Clark</div><div class="gr">Clarity Architect</div><div class="dot" id="clark-dot"></div></div><div id="star-zone"><svg class="ll" viewBox="0 0 80 10"><line x1="0" y1="5" x2="80"

  3"/></svg></div><div id="aioo-guy" class="guy" data-role="aioo"><svg class="sil" viewBox="0 0 60 100"><ellipse cx="30" cy="18" rx="14" ry="14" class="head"/><path d="M10 100 Q10 55 30 50 Q50 55 50 100Z" class="body"/><line x1="10" y1="65"
  x2="0" y2="85" class="arm"/><line x1="50" y1="65" x2="60" y2="85" class="arm"/></svg><div class="gl">AIOO</div><div class="gr">AI Operating Officer</div><div class="dot" id="aioo-dot"></div></div><div id="fzone"><svg
  style="width:10px;height:40px;display:block"><line x1="5" y1="0" x2="5" y2="40" stroke="#2e2e45" stroke-width="1.5" stroke-dasharray="4 3"/></svg><button id="factory-btn" class="art"><span class="fi">⚙</span><span

  class="chip" data-color="amber" style="--c:#f59e0b"></button><button class="chip" data-color="emerald" style="--c:#10b981"></button><button class="chip" data-color="rose" style="--c:#f43f5e"></button></div></section><div id="bp"><section
  id="ap"><h2>Activity <span id="plabel"></span></h2><ul id="elist"></ul></section><section id="sp"><h2>Sandboxes</h2><table
  id="stbl"><thead><tr><th>Name</th><th>Role</th><th>Project</th><th>Cost</th><th>Events</th><th></th></tr></thead><tbody id="stbody"></tbody></table></section></div></main><div id="ns-modal" class="modal hidden"><div class="mc"><div

  value="clark">clark</option></select></label><label>Name<input id="f-name" type="text" placeholder="e.g. architecture" required></label><label>Project<select id="f-proj"><option value="personal-ai">personal-ai</option><option
