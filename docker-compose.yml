# Personal AI v0.2 — Compose Services
# Only always-on services live here.
# Clark, AIOO, and App Builder containers are spawned via:
#   ./clark.sh          — spawn your Clark
#   ./aioo.sh <entity>  — spawn an entity AIOO
#   ./app-builder.sh <entity> <app>  — spawn an App Builder
#
# Usage:
#   docker compose --profile seed up -d          # start Content Loader
#   docker compose --profile seed down           # stop Content Loader

services:

  # ── Content Loader ─────────────────────────────────────────────────────────
  # Watches all entity Raw/ dirs and distills notes for Clark and AIOO.
  # Reads config.json to discover entities at startup.
  content-loader:
    profiles: [seed]
    build:
      context: ./content-loader
    container_name: content-loader
    volumes:
      - chronicle-vault:/vault
      - ./config.json:/app/config.json:ro
    environment:
      - VAULT_PATH=/vault
      - CONFIG_PATH=/app/config.json
    restart: unless-stopped

volumes:
  chronicle-vault:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/chronicle-vault
