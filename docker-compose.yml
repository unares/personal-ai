services:
  dashboard:
    build: ./dashboard
    ports: ["3002:3000"]
    volumes:
      - ./obsidian-vault:/app/vault
  personal-ai-platform-dev:
    build: ./ai-workspace
    container_name: personal-ai-platform-dev
    ports: ["3003:3000"]
    volumes:
      - ./shared:/app/shared:ro
      - ./obsidian-vault/projects/personal-ai-platform-dev:/app/vault
  clarity-architect:
    build: ./clarity-architect
    ports: ["3004:3000"]
    volumes:
      - ./shared:/app/shared:ro
