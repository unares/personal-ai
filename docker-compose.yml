# Personal AI Workspace — Docker Compose Topology
# Spec: memory-vault/ai-workspace/Specifications/docker-compose-topology.md
#
# Usage:
#   docker compose up -d                                  # Chronicle only (always-on)
#   docker compose --profile procenteo up -d              # + AIOO + ai-gateway for procenteo
#   docker compose --profile procenteo-app-demo up -d     # + procenteo Demo stage container
#   docker compose --profile inisio up -d                 # + AIOO + ai-gateway for inisio
#
# Prerequisites:
#   ./setup/init-ipc.sh   (creates ipc/ and config/ directories)
#   cp .env.example .env  (fill in API keys)
#
# Clark and Unares are NOT in compose — spawned by NanoClaw-PAW via:
#   docker run --rm --network ephemeral-companion-net ...

# ── Shared config anchors ────────────────────────────────────────
x-stage-healthcheck: &stage-healthcheck
  test: ["CMD", "test", "-f", "/tmp/alive"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 10s

services:

  # ── Chronicle (always-on) ──────────────────────────────────────────
  # Vault watcher + QMD hybrid search index.
  # Watches memory-vault for .md changes → JSONL audit events.
  # Serves MCP HTTP on :8181 (Docker network only, no host port).
  chronicle:
    build:
      context: ./chronicle
    container_name: chronicle
    networks:
      - procenteo-net
      - inisio-net
    volumes:
      - ./memory-vault:/vault:ro
      - ./memory-vault/ai-workspace/Logs:/vault/ai-workspace/Logs
      - ./memory-vault/procenteo/Logs:/vault/procenteo/Logs
      - ./memory-vault/inisio/Logs:/vault/inisio/Logs
      - memory-vault-index:/data
      - ./config.json:/app/config.json:ro
    environment:
      - XDG_CACHE_HOME=/data
      - VAULT_PATH=/vault
      - CONFIG_PATH=/app/config.json
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8181"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── ai-gateway-procenteo ──────────────────────────────────────────
  # Per-entity LLM proxy (LiteLLM). Routes Gemini + Claude calls.
  # Cost tracking per entity. No host port exposed.
  ai-gateway-procenteo:
    profiles: [procenteo]
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-gateway-procenteo
    networks:
      - procenteo-net
    volumes:
      - ./config/ai-gateway-procenteo/config.yaml:/app/config.yaml:ro
    environment:
      - GEMINI_API_KEY=${PROCENTEO_GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${PROCENTEO_ANTHROPIC_API_KEY}
      - LITELLM_MASTER_KEY=${PROCENTEO_LITELLM_MASTER_KEY}
    command: ["--config", "/app/config.yaml"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── ai-gateway-inisio ─────────────────────────────────────────────
  ai-gateway-inisio:
    profiles: [inisio]
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-gateway-inisio
    networks:
      - inisio-net
    volumes:
      - ./config/ai-gateway-inisio/config.yaml:/app/config.yaml:ro
    environment:
      - GEMINI_API_KEY=${INISIO_GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${INISIO_ANTHROPIC_API_KEY}
      - LITELLM_MASTER_KEY=${INISIO_LITELLM_MASTER_KEY}
    command: ["--config", "/app/config.yaml"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/liveliness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── aioo-procenteo ────────────────────────────────────────────────
  # AI Operating Officer for procenteo entity.
  # Vault r/w, IPC r/w, ai-gateway access.
  aioo-procenteo:
    profiles: [procenteo]
    build:
      context: ./containers/aioo
    container_name: aioo-procenteo
    networks:
      - procenteo-net
    volumes:
      - ./memory-vault/procenteo:/vault
      - ./ipc/aioo-procenteo:/ipc
      - ./lib/ipc:/app/lib/ipc:ro
      - ./config/aioo-procenteo.json:/config/aioo.json:ro
      - ./memory-vault/SOUL.md:/identity/SOUL.md:ro
      - ./memory-vault/AIOO_IDENTITY.md:/identity/AIOO_IDENTITY.md:ro
      - ./containers/aioo/CLAUDE.md:/identity/CLAUDE.md:ro
    environment:
      - ENTITY=procenteo
      - AI_GATEWAY_URL=http://ai-gateway-procenteo:4000
      - AI_GATEWAY_API_KEY=${PROCENTEO_LITELLM_MASTER_KEY}
      - CHRONICLE_URL=http://chronicle:8181
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── aioo-inisio ───────────────────────────────────────────────────
  aioo-inisio:
    profiles: [inisio]
    build:
      context: ./containers/aioo
    container_name: aioo-inisio
    networks:
      - inisio-net
    volumes:
      - ./memory-vault/inisio:/vault
      - ./ipc/aioo-inisio:/ipc
      - ./lib/ipc:/app/lib/ipc:ro
      - ./config/aioo-inisio.json:/config/aioo.json:ro
      - ./memory-vault/SOUL.md:/identity/SOUL.md:ro
      - ./memory-vault/AIOO_IDENTITY.md:/identity/AIOO_IDENTITY.md:ro
      - ./containers/aioo/CLAUDE.md:/identity/CLAUDE.md:ro
    environment:
      - ENTITY=inisio
      - AI_GATEWAY_URL=http://ai-gateway-inisio:4000
      - AI_GATEWAY_API_KEY=${INISIO_LITELLM_MASTER_KEY}
      - CHRONICLE_URL=http://chronicle:8181
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── App Dev Stage Containers ──────────────────────────────────────
  # Agent workspace containers. NanoClaw-PAW docker-execs Claude CLI
  # agents into these. Vault = read context, workspace = write code.

  # ── Procenteo stages ─────────────────────────────────────────────
  procenteo-app-demo:
    profiles: [procenteo-app-demo]
    build:
      context: ./containers/app-dev-stage
      args:
        STAGE: demo
    container_name: procenteo-app-demo
    networks:
      - procenteo-net
    volumes:
      - ./memory-vault/procenteo:/vault:ro
      - ./app-workspaces/procenteo/procenteo-app-demo:/workspace
    environment:
      - ENTITY=procenteo
      - APP=procenteo
      - STAGE=demo
      - AI_GATEWAY_URL=http://ai-gateway-procenteo:4000
      - CHRONICLE_URL=http://chronicle:8181
    healthcheck: *stage-healthcheck
    restart: unless-stopped

  procenteo-app-testing:
    profiles: [procenteo-app-testing]
    build:
      context: ./containers/app-dev-stage
      args:
        STAGE: testing
    container_name: procenteo-app-testing
    networks:
      - procenteo-net
    volumes:
      - ./memory-vault/procenteo:/vault:ro
      - ./app-workspaces/procenteo/procenteo-app-testing:/workspace
    environment:
      - ENTITY=procenteo
      - APP=procenteo
      - STAGE=testing
      - AI_GATEWAY_URL=http://ai-gateway-procenteo:4000
      - CHRONICLE_URL=http://chronicle:8181
    healthcheck: *stage-healthcheck
    restart: unless-stopped

  procenteo-app-launch:
    profiles: [procenteo-app-launch]
    build:
      context: ./containers/app-dev-stage
      args:
        STAGE: launch
    container_name: procenteo-app-launch
    networks:
      - procenteo-net
    volumes:
      - ./memory-vault/procenteo:/vault:ro
      - ./app-workspaces/procenteo/procenteo-app-launch:/workspace
    environment:
      - ENTITY=procenteo
      - APP=procenteo
      - STAGE=launch
      - AI_GATEWAY_URL=http://ai-gateway-procenteo:4000
      - CHRONICLE_URL=http://chronicle:8181
    healthcheck: *stage-healthcheck
    restart: unless-stopped

  procenteo-app-scaling:
    profiles: [procenteo-app-scaling]
    build:
      context: ./containers/app-dev-stage
      args:
        STAGE: scaling
    container_name: procenteo-app-scaling
    networks:
      - procenteo-net
    volumes:
      - ./memory-vault/procenteo:/vault:ro
      - ./app-workspaces/procenteo/procenteo-app-scaling:/workspace
    environment:
      - ENTITY=procenteo
      - APP=procenteo
      - STAGE=scaling
      - AI_GATEWAY_URL=http://ai-gateway-procenteo:4000
      - CHRONICLE_URL=http://chronicle:8181
    healthcheck: *stage-healthcheck
    restart: unless-stopped

  # ── Inisio stages ───────────────────────────────────────────────
  inisio-app-demo:
    profiles: [inisio-app-demo]
    build:
      context: ./containers/app-dev-stage
      args:
        STAGE: demo
    container_name: inisio-app-demo
    networks:
      - inisio-net
    volumes:
      - ./memory-vault/inisio:/vault:ro
      - ./app-workspaces/inisio/inisio-app-demo:/workspace
    environment:
      - ENTITY=inisio
      - APP=inisio
      - STAGE=demo
      - AI_GATEWAY_URL=http://ai-gateway-inisio:4000
      - CHRONICLE_URL=http://chronicle:8181
    healthcheck: *stage-healthcheck
    restart: unless-stopped

  inisio-app-testing:
    profiles: [inisio-app-testing]
    build:
      context: ./containers/app-dev-stage
      args:
        STAGE: testing
    container_name: inisio-app-testing
    networks:
      - inisio-net
    volumes:
      - ./memory-vault/inisio:/vault:ro
      - ./app-workspaces/inisio/inisio-app-testing:/workspace
    environment:
      - ENTITY=inisio
      - APP=inisio
      - STAGE=testing
      - AI_GATEWAY_URL=http://ai-gateway-inisio:4000
      - CHRONICLE_URL=http://chronicle:8181
    healthcheck: *stage-healthcheck
    restart: unless-stopped

  inisio-app-launch:
    profiles: [inisio-app-launch]
    build:
      context: ./containers/app-dev-stage
      args:
        STAGE: launch
    container_name: inisio-app-launch
    networks:
      - inisio-net
    volumes:
      - ./memory-vault/inisio:/vault:ro
      - ./app-workspaces/inisio/inisio-app-launch:/workspace
    environment:
      - ENTITY=inisio
      - APP=inisio
      - STAGE=launch
      - AI_GATEWAY_URL=http://ai-gateway-inisio:4000
      - CHRONICLE_URL=http://chronicle:8181
    healthcheck: *stage-healthcheck
    restart: unless-stopped

  inisio-app-scaling:
    profiles: [inisio-app-scaling]
    build:
      context: ./containers/app-dev-stage
      args:
        STAGE: scaling
    container_name: inisio-app-scaling
    networks:
      - inisio-net
    volumes:
      - ./memory-vault/inisio:/vault:ro
      - ./app-workspaces/inisio/inisio-app-scaling:/workspace
    environment:
      - ENTITY=inisio
      - APP=inisio
      - STAGE=scaling
      - AI_GATEWAY_URL=http://ai-gateway-inisio:4000
      - CHRONICLE_URL=http://chronicle:8181
    healthcheck: *stage-healthcheck
    restart: unless-stopped

networks:
  procenteo-net:
    driver: bridge
    name: procenteo-net
  inisio-net:
    driver: bridge
    name: inisio-net

volumes:
  memory-vault-index:
    # QMD index (SQLite FTS5 + sqlite-vec) + GGUF model cache
