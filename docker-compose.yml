# Personal AI v0.2 — Compose Services
# Only always-on services live here.
# Clark, AIOO, and App Builder containers are spawned via:
#   ./clark.sh          — spawn your Clark
#   ./aioo.sh <entity>  — spawn an entity AIOO
#   ./app-builder.sh <entity> <app>  — spawn an App Builder
#
# Usage:
#   docker compose --profile seed up -d          # start Context Extractor
#   docker compose --profile seed down           # stop Context Extractor

services:

  # ── Context Extractor ──────────────────────────────────────────────────────
  # Watches all entity Raw/ dirs and distills notes for Clark and AIOO.
  # Reads config.json to discover entities at startup.
  context-extractor:
    profiles: [seed]
    build:
      context: ./context-extractor
    container_name: context-extractor
    volumes:
      - memory-vault:/vault
      - ./config.json:/app/config.json:ro
    environment:
      - VAULT_PATH=/vault
      - CONFIG_PATH=/app/config.json
    restart: unless-stopped

volumes:
  memory-vault:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/memory-vault
